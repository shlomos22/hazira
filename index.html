<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זירה - חמישה חומשי תורה</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85); 
            --text-color: #f8fafc;
            --accent-p1: #ef4444;
            --accent-p2: #3b82f6;
            --completed-bg: rgba(245, 158, 11, 0.25);
            --completed-border: #f59e0b;
            --completed-text: #fef08a;
            --eliminated-bg: rgba(71, 85, 105, 0.4);
            --eliminated-text: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .scoreboard {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; 
            display: none; 
            z-index: 10;
        }

        .player-box {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            padding: 20px 25px;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
            min-width: 170px;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: auto; 
        }

        #p1-box { right: 30px; } 
        #p2-box { left: 30px; }  

        .player-box.active-p1 { border-color: var(--accent-p1); box-shadow: 0 0 25px var(--accent-p1); }
        .player-box.active-p2 { border-color: var(--accent-p2); box-shadow: 0 0 25px var(--accent-p2); }

        .player-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 5px; }
        .timer { font-size: 3rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 220px; 
        }

        .welcome-landing-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .welcome-landing-image {
            max-width: 80%;
            max-height: 55vh;
            border-radius: 16px;
            box-shadow: none;
            object-fit: contain;
            margin-bottom: 20px;
        }

        /* פריסת קטגוריות - ממורכזת ורספונסיבית על בסיס Flex עם רוחב מקסימלי קשיח */
        .categories-grid {
            display: none; 
            display: flex;
            flex-wrap: wrap;
            justify-content: center; 
            gap: 25px;
            width: 100%;
            max-width: 720px; 
            padding: 20px;
            z-index: 4;
            margin: 0 auto;
        }

        .category-card {
            background-color: var(--card-bg);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 30px 15px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 220px;
            box-sizing: border-box;
        }

        .category-card:hover:not(.completed):not(.eliminated) {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .category-card.completed {
            background-color: var(--completed-bg);
            border: 2px solid var(--completed-border);
            color: var(--completed-text);
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }

        .category-card.eliminated {
            background-color: var(--eliminated-bg);
            border: 2px dashed #475569;
            color: var(--completed-text);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.4;
        }

        .category-card .status-tag {
            display: block;
            font-size: 0.85rem;
            margin-top: 8px;
            color: #38bdf8;
        }

        .category-card.completed .status-tag {
            color: #f59e0b;
            font-weight: bold;
        }
        
        .category-card.eliminated .status-tag {
            color: #ef4444;
            font-weight: bold;
        }

        .opponent-select-box {
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(15, 23, 42, 0.95);
            border: 3px solid #38bdf8;
            padding: 30px;
            border-radius: 20px;
            z-index: 15;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .opponent-select-box h2 {
            margin-top: 0;
            font-size: 2rem;
            color: #38bdf8;
        }

        .opponent-buttons-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .opponent-btn {
            background: #1e293b;
            border: 2px solid #475569;
            color: white;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .opponent-btn:hover {
            background: #3b82f6;
            border-color: #3b82f6;
            transform: scale(1.05);
        }

        .game-arena {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        .image-container {
			max-width: 100%;
			max-height: 55vh;
			border-radius: 16px;
			overflow: hidden;
			background: transparent; 
			box-shadow: none;        
			display: flex;
			align-items: center;
			justify-content: center;
		}

        .game-image {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            display: none;
        }

        .text-question-box {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border: 3px solid #475569;
            border-radius: 16px;
            padding: 50px 40px;
            width: 85%;
            box-sizing: border-box;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #f1f5f9;
            display: none;
        }

        .countdown-overlay {
			font-size: 30rem;
			font-weight: 900;
			color: #ef4444; 
			text-shadow: 0 0 10px #ef4444, 0 0 30px rgba(239, 68, 68, 0.5); 
			display: none;
			margin-bottom: 20px;
		}

        .info-zone {
            margin-top: 30px;
            text-align: center;
            min-height: 80px;
        }

        .status-text {
            font-size: 2rem;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 15px;
            white-space: pre-line;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }

        .answer-text {
            font-size: 2.8rem;
            font-weight: bold;
            color: #10b981;
            background: rgba(16, 185, 129, 0.2);
            padding: 8px 40px;
            border-radius: 30px;
            border: 2px solid #10b981;
            visibility: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 20px;
            display: none;
        }

        .overlay h1 { font-size: 3.5rem; color: #f59e0b; margin-bottom: 20px; white-space: pre-line; }
        
        .space-hint {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-top: 20px;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
    </style>
</head>

                    { text: "אָז יָשִׁיר מֹשֶׁה וּבְנֵי יִשְׂרָאֵל אֶת הַשִּׁירָה הַזֹּאת לַה' וַיֹּאמרוּ לֵאמֹר אָשירָה לַה' כִּי גָאָה גָּאָה _______ רָמָה בַיָּם.", answer: "סוּס וְרֹכְבוֹ" },
                    { text: "לֹא תִקֹּם וְלֹא תִטֹּר אֶת בְּנֵי עַמֶּךָ _______ לְרֵעֲךָ כמוך", answer: "וְאָהַבְתָּ" },
                    { text: "מִפְּנֵי שֵׂיבָה תָּקוּם _____ פְּנֵי זָקֵן", answer: "וְהָדַרְתָּ" },
                    { text: "יְבָרֶכְךָ ה ______", answer: "וְיִשְׁמְרֶךָ" },
                    { text: "וַיְהִי בִּנְסֹעַ הָאָרֹן וַיֹּאמֶר מֹשֶׁה קוּמָה ה- וְיָפֻצוּ אֹיְבֶיךָ _____ מְשׂנְאֶיךָ מִפָּנֶיךָ.", answer: "וְיָנֻסוּ" },
                    { text: "מַה טֹּבוּ אֹהָלֶיךָ יַעֲקֹב ____________", answer: "ִמשְׁכְּנֹתֶיךָ יִשְׂרָאֵל" },
                    { text: "וְעָשׂוּ לָהם צִיצִת עַל כַּנְפֵי בִגְדֵיהֶם לְדֹרֹתָם וְנָתְנוּ עַל צִיצִת הַכָּנָף __________", answer: "פְּתִיל תְּכֵלֶת" },
                    { text: "יָאֵר ה' פָּנָיו אֵלֶיךָ ______", answer: "וְיִחֻנֶּךָ" },
                    { text: "שְׁמַע יִשְׂרָאֵל יְהוָה אֱלֹהֵינוּ יְהוָה _____", answer: "אֶחָד" },
                    { text: "וּקְשַׁרְתָּם לְאוֹת עַל יָדֶךָ וְהָיוּ ______ בֵּין עינֶיךָ.", answer: "לְטֹטָפֹת" },
                    { text: "ארץ ____ חלב ודבש", answer: "זבת" },
                    { text: "וּכְתַבְתָּם עַל מְזֻזוֹת _____ וּבִשְׁעָרֶךָ.", answer: "בֵּיתֶךָ" },
                    { text: "וְאָהַבְתָּ אֵת יְהוָה אֱלֹהֶיךָ בְּכָל ____________ וּבְכָל מְאֹדֶךָ.", answer: "לְבָבְךָ וּבְכָל נַפְשְׁך" },
                    { text: "יִשָּׂא ה' פָּנָיו אֵלֶיךָ וְיָשֵׂם לְךָ ______", answer: "שָׁלוֹם" },
                    { text: "וְהָיוּ הַדְּבָרִים הָאֵלֶּה אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם עַל לְבָבֶךָ. וְשִׁנַּנְתָּם לְבָנֶיךָ וְדִבַּרְתָּ בָּם בְּשִׁבְתְּךָ בְּבֵיתֶךָ וּבְלֶכְתְּךָ בַדֶּרֶךְ _____________", answer: "וּבְשָׁכְבְּךָ וּבְקוּמֶךָ" },
                    { text: "וְאָכַלְתָּ ______ וּבֵרַכְתָּ אֵת יְהוָה אֱלֹהֶיךָ עַל הָאָרֶץ הַטֹּבָה אֲשֶׁר נָתַן לָךְ.", answer: "וְשָׂבָעְתָּ" }
                ]
            },
            {
                id: 4,
                categoryName: "מי אמר למי",
                completed: false,
                winnerName: null,
                questions: [
                    { text: "הַעוֹד אָבִי חָי?", answer: "יוסף אל אחיו, בראשית" },
                    { text: "שְׁלַח נְעָלֶיךָ מֵעַל רַגלֶיךָ", answer: "ה' אל משה בסנה, שמות" },
                    { text: "נַעֲשֶׂה וְנִשְׁמָע", answer: "בני ישראל אל משה, שמות" },
                    { text: "הַלְעֵטִנִי נָא מִן הָאָדֹם הָאָדֹם הַזֶּה", answer: "עשו אל יעקב, בראשית" },
                    { text: "מַה טֹּבוּ אֹהָלֶיךָ יַעֲקֹב", answer: "בלעם אל בני ישראל, במדבר" },
                    { text: "אֶת אַחַי אָנֹכִי מְבַקֵּשׁ", answer: "יוסף אל האיש בשדה, בראשית" },
                    { text: "לָמָּה זֶּה צָחֲקָה שָׂרָה?", answer: "ה' אל אברהם, בראשית" },
                    { text: "הַשֹּׁמֵר אָחִי אָנֹכִי?", answer: "קין אל ה', בראשית" },
                    { text: "אִם אֶמְצָא בִסְדֹם חֲמִשִּׁים צַדִּיקִם וְנָשָׂאתִי לְכָל הַמָּקוֹם בַּעֲבוּרָם", answer: "ה' אל אברהם, בראשית" },
                    { text: "הִנֵּה הָאֵשׁ וְהָעֵצִים וְאַיֵּה הַשֶּׂה לְעֹלָה", answer: "יצחק אל אברהם, בראשית" },
                    { text: "מִי שָׂמְךָ לְאִישׁ שַׂר וְשֹׁפֵט עָלֵינוּ? הַלְהָרְגֵנִי מִשָּׁם אַתָּה אֹמֵר כַּאֲשֶׁר הָרַגְתָּ אֶת הַמִּצְרִי?", answer: "האיש העברי אל משה, שמות" },
                    { text: "קוּמוּ צְּאוּ מִתּוֹךְ עַמִּי גַּם אַתֶּם גַּם בְּנֵי יִשְׂרָאֵל", answer: "פרעה אל משה ואהרון, שמות" },
                    { text: "לָמָּה הִכִּיתָ אֶת אֲתֹנְךָ זֶה שָׁלוֹשׁ רְגָלִים", answer: "מלאך ה' אל בלעם, במדבר" }
                ]
            },
        ];

        const STATES = {
            LANDING_SCREEN: "LANDING_SCREEN",     
            SELECTION_SCREEN: "SELECTION_SCREEN", 
            OPPONENT_SELECT: "OPPONENT_SELECT", 
            START_SCREEN: "START_SCREEN",         
            COUNTDOWN: "COUNTDOWN", 
            RUNNING: "RUNNING",                   
            SHOWING_ANSWER: "SHOWING_ANSWER",
            STAGE_SUMMARY: "STAGE_SUMMARY", 
            FINAL_SUMMARY: "FINAL_SUMMARY"  
        };

        let gameState = STATES.LANDING_SCREEN;
        let p1GroupNum = null; 
        let p2GroupNum = null; 
        let currentPlayer = 1;
        let timers = { 1: 20, 2: 20 };
        let scores = { 1: 0, 2: 0 }; 
        
        let selectedCategoryIdx = null; 
        let currentQuestionIndex = 0;   
        let intervalId = null;
        let shouldApplyPenalty = false; 

        // אלמנטים
        const scoreboard = document.getElementById('scoreboard');
        const welcomeLandingScreen = document.getElementById('welcome-landing-screen');
        const landingImgElement = document.getElementById('landing-img-element');
        const gridContainer = document.getElementById('categories-grid');
        const arena = document.getElementById('arena');
        const countdownDisplay = document.getElementById('countdown-display');
        const imageContainer = document.getElementById('image-container');
        const textQuestionBox = document.getElementById('text-question-box');
        const opponentSelectBox = document.getElementById('opponent-select-box');
        const opponentButtonsContainer = document.getElementById('opponent-buttons-container');
        const opponentBoxTitle = document.getElementById('opponent-box-title');
        
        const p1Box = document.getElementById('p1-box');
        const p2Box = document.getElementById('p2-box');
        const p1TimerText = document.getElementById('p1-timer');
        const p2TimerText = document.getElementById('p2-timer');
        const p1TitleText = document.getElementById('p1-title');
        const p2TitleText = document.getElementById('p2-title');
        const gameImg = document.getElementById('game-img');
        const statusDisplay = document.getElementById('status-display');
        const answerDisplay = document.getElementById('answer-display');
        const endScreen = document.getElementById('end-screen');
        const winnerText = document.getElementById('winner-text');

        function initGame() {
            timers = { 1: 20, 2: 20 };
            scores = { 1: 0, 2: 0 };
            currentPlayer = 1;
            eliminatedGroups = { 1: false, 2: false, 3: false, 4: false, 5: false };
            
            gameCategories[0].groupId = 1;
            gameCategories[1].groupId = 2;
            gameCategories[2].groupId = 3;
            gameCategories[3].groupId = 4;
            gameCategories[4].groupId = 5;

            gameCategories.forEach(cat => {
                cat.completed = false;
                cat.winnerName = null; 
            });
            
            gameState = STATES.LANDING_SCREEN;
            landingImgElement.src = welcomeImage;
            welcomeLandingScreen.style.display = 'flex';
            gridContainer.style.display = 'none';
            opponentSelectBox.style.display = 'none';
            arena.style.display = 'none';
            scoreboard.style.display = 'none';

            updateVisuals();
        }

        function showSelectionGrid() {
            gameState = STATES.SELECTION_SCREEN;
            welcomeLandingScreen.style.display = 'none'; 
            arena.style.display = 'none';                
            scoreboard.style.display = 'none';           
            opponentSelectBox.style.display = 'none';
            gridContainer.style.display = 'flex';        

            p1Box.classList.remove('active-p1');
            p2Box.classList.remove('active-p2');

            gridContainer.innerHTML = '';
            gameCategories.forEach(cat => {
                const card = document.createElement('div');
                
                let cardClass = 'category-card';
                let tagContent = `משוייכת ל: ${groupNames[cat.groupId]}`;
                
                if (cat.completed) {
                    if (cat.winnerName) {
                        cardClass += ' completed';
                        tagContent = `מנצח: ${cat.winnerName}`;
                    } else {
                        cardClass += ' completed';
                        tagContent = '(הושלם)';
                    }
                }

                card.className = cardClass;
                card.innerHTML = `
                    <div>${cat.categoryName}</div>
                    <span class="status-tag">${tagContent}</span>
                `;
                
                if (!cat.completed) {
                    card.addEventListener('click', () => startOpponentSelection(cat.id));
                }
                gridContainer.appendChild(card);
            });

            if (gameCategories.every(cat => cat.completed)) {
                declareFinalWinner();
            }
        }

        function startOpponentSelection(catId) {
            selectedCategoryIdx = gameCategories.findIndex(cat => cat.id === catId);
            const cat = gameCategories[selectedCategoryIdx];
            
            gameState = STATES.OPPONENT_SELECT;
            gridContainer.style.display = 'none';
            opponentSelectBox.style.display = 'flex';
            
            p1GroupNum = cat.groupId; 
            p1TitleText.innerText = groupNames[p1GroupNum];
            
            opponentBoxTitle.innerText = `קטגוריית ${cat.categoryName} (${groupNames[p1GroupNum]})\nמי הקבוצה המאתגרת?`;
            opponentButtonsContainer.innerHTML = '';
            
            for (let i = 1; i <= 5; i++) {
                if (i !== p1GroupNum && !eliminatedGroups[i]) {
                    const btn = document.createElement('button');
                    btn.className = 'opponent-btn';
                    btn.innerText = groupNames[i];
                    btn.addEventListener('click', () => launchCategoryWithOpponent(i));
                    opponentButtonsContainer.appendChild(btn);
                }
            }
        }

        function launchCategoryWithOpponent(selectedOpponentId) {
            p2GroupNum = selectedOpponentId; 
            p2TitleText.innerText = groupNames[p2GroupNum];
            
            opponentSelectBox.style.display = 'none';
            arena.style.display = 'flex';
            imageContainer.style.display = 'flex';
            textQuestionBox.style.display = 'none';
            countdownDisplay.style.display = 'none';
            gameImg.style.display = 'block';
            gameImg.src = welcomeImage;
            
            timers = { 1: 20, 2: 20 }; 
            answerDisplay.style.visibility = 'hidden'; 
            currentPlayer = 1; 
            
            currentQuestionIndex = 0;
            gameState = STATES.START_SCREEN;
            shouldApplyPenalty = false;
            scores = { 1: 0, 2: 0 };
            
            const cat = gameCategories[selectedCategoryIdx];
            statusDisplay.innerText = `זירה: ${groupNames[p1GroupNum]} נגד ${groupNames[p2GroupNum]}\nלחצו רווח להתחלה!`;
            updateVisuals();
        }

        function startCountdown() {
            gameState = STATES.COUNTDOWN;
            imageContainer.style.display = 'none'; 
            textQuestionBox.style.display = 'none';
            countdownDisplay.style.display = 'block'; 
            
            let count = 3;
            countdownDisplay.innerText = count;
            statusDisplay.innerText = "המשחק מתחיל בעוד...";

            let countdownId = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownDisplay.innerText = count;
                } else {
                    clearInterval(countdownId);
                    countdownDisplay.style.display = 'none';
                    
                    loadQuestion();
                    startTurn();
                }
            }, 1000);
        }

        function loadQuestion() {
            const cat = gameCategories[selectedCategoryIdx];
            
            if (currentQuestionIndex >= cat.questions.length) {
                cat.completed = true;
                clearInterval(intervalId);
                
                let winner;
                let winningGroupNum, losingGroupNum;
                
                if (scores[1] > scores[2]) {
                    winner = 1;
                    winningGroupNum = p1GroupNum;
                    losingGroupNum = p2GroupNum;
                } else if (scores[2] > scores[1]) {
                    winner = 2;
                    winningGroupNum = p2GroupNum;
                    losingGroupNum = p1GroupNum;
                } else {
                    winner = "תיקו";
                }
                
                if (winner !== "תיקו") {
                    cat.winnerName = groupNames[winningGroupNum];
                    eliminatedGroups[losingGroupNum] = true; 
                    transferOwnership(losingGroupNum, winningGroupNum);
                } else {
                    cat.winnerName = "תיקו";
                }
                
                showStageSummary(winner);
                return;
            }

            welcomeLandingScreen.style.display = 'none';
            const q = cat.questions[currentQuestionIndex];

            if (q.text) {
                imageContainer.style.display = 'none';
                textQuestionBox.style.display = 'block';
                textQuestionBox.innerText = q.text;
            } else {
                textQuestionBox.style.display = 'none';
                imageContainer.style.display = 'flex';
                gameImg.style.display = 'block';
                gameImg.src = q.image;
            }

            answerDisplay.innerText = q.answer;
            answerDisplay.style.visibility = 'hidden';
        }

        function startTurn() {
            gameState = STATES.RUNNING;
            scoreboard.style.display = 'block'; 
            statusDisplay.innerText = `תור: ${currentPlayer === 1 ? groupNames[p1GroupNum] : groupNames[p2GroupNum]} - השעון רץ!`;
            
            p1Box.classList.toggle('active-p1', currentPlayer === 1);
            p2Box.classList.toggle('active-p2', currentPlayer === 2);

            clearInterval(intervalId);
            intervalId = setInterval(() => {
                timers[currentPlayer]--;
                updateVisuals();

                if (timers[currentPlayer] <= 0) {
                    clearInterval(intervalId);
                    
                    const cat = gameCategories[selectedCategoryIdx];
                    cat.completed = true;
                    
                    const runningOutPlayer = currentPlayer;
                    const winner = (runningOutPlayer === 1) ? 2 : 1;
                    
                    const winningGroupNum = (winner === 1) ? p1GroupNum : p2GroupNum;
                    const losingGroupNum = (runningOutPlayer === 1) ? p1GroupNum : p2GroupNum;
                    
                    cat.winnerName = groupNames[winningGroupNum];
                    eliminatedGroups[losingGroupNum] = true; 
                    
                    transferOwnership(losingGroupNum, winningGroupNum);
                    showStageSummary(winner);
                }
            }, 1000);
        }

        function transferOwnership(fromGroup, toGroup) {
            gameCategories.forEach(cat => {
                if (cat.groupId === fromGroup && !cat.completed) {
                    cat.groupId = toGroup; 
                }
            });
        }

        function triggerPenaltyStop() {
            if (gameState !== STATES.RUNNING) return;
            
            clearInterval(intervalId);
            shouldApplyPenalty = true; 
            answerDisplay.style.visibility = 'visible';
            statusDisplay.innerText = `${currentPlayer === 1 ? groupNames[p1GroupNum] : groupNames[p2GroupNum]} ביקש עבור.`;
            gameState = STATES.SHOWING_ANSWER;
        }

        function handleSpaceAction() {
            if (gameState === STATES.STAGE_SUMMARY) {
                closeSummaryAndGoToGrid();
                return;
            }
            if (gameState === STATES.FINAL_SUMMARY) {
                resetGame();
                return;
            }
            if (gameState === STATES.COUNTDOWN || gameState === STATES.OPPONENT_SELECT) return;

            if (gameState === STATES.LANDING_SCREEN) {
                showSelectionGrid();
                return;
            }

            if (gameState === STATES.SELECTION_SCREEN) return;

            const cat = gameCategories[selectedCategoryIdx];

            if (gameState === STATES.START_SCREEN) {
                startCountdown();
            }
            else if (gameState === STATES.RUNNING) {
                clearInterval(intervalId);
                shouldApplyPenalty = false; 
                scores[currentPlayer]++; 
                updateVisuals();
                
                answerDisplay.style.visibility = 'visible';
                statusDisplay.innerText = ""; 
                gameState = STATES.SHOWING_ANSWER;
            } 
            else if (gameState === STATES.SHOWING_ANSWER) {
                if (shouldApplyPenalty) {
                    timers[currentPlayer] = Math.max(0, timers[currentPlayer] - 3);
                    shouldApplyPenalty = false; 
                    updateVisuals();
                    
                    if (timers[currentPlayer] <= 0) {
                        cat.completed = true;
                        const winner = (currentPlayer === 1) ? 2 : 1;
                        
                        const winningGroupNum = (winner === 1) ? p1GroupNum : p2GroupNum;
                        const losingGroupNum = (currentPlayer === 1) ? p1GroupNum : p2GroupNum;
                        
                        cat.winnerName = groupNames[winningGroupNum];
                        eliminatedGroups[losingGroupNum] = true; 
                        
                        transferOwnership(losingGroupNum, winningGroupNum);
                        showStageSummary(winner);
                        return;
                    }
                } else {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                }

                currentQuestionIndex++;
                loadQuestion();
                
                if (gameState === STATES.RUNNING || (gameState !== STATES.SELECTION_SCREEN && currentQuestionIndex < cat.questions.length)) {
                    startTurn();
                }
            }
        }

        function updateVisuals() {
            p1TimerText.innerText = timers[1];
            p2TimerText.innerText = timers[2];
        }

        function showStageSummary(winner) {
            gameState = STATES.STAGE_SUMMARY; 
            
            if (winner === "תיקו") {
                winnerText.innerText = `השלב הסתיים בתיקו!`;
            } else {
                const winningGroupName = (winner === 1) ? groupNames[p1GroupNum] : groupNames[p2GroupNum];
                winnerText.innerText = `${winningGroupName} ניצחה בשלב זה!`;
            }
            endScreen.style.display = 'flex';
        }

        function closeSummaryAndGoToGrid() {
            endScreen.style.display = 'none';
            showSelectionGrid();
        }

        function declareFinalWinner() {
            gameState = STATES.FINAL_SUMMARY; 
            clearInterval(intervalId);
            
            let aliveGroups = [];
            for (let i = 1; i <= 5; i++) {
                if (!eliminatedGroups[i]) aliveGroups.push(groupNames[i]);
            }

            if (aliveGroups.length === 1) {
                winnerText.innerText = `הטורניר הסתיים!\n\nהקבוצה האלופה:\n👑 ${aliveGroups[0]} 👑`;
            } else {
                winnerText.innerText = `הטורניר הסתיים!\n\nהקבוצות ששרדו:\n${aliveGroups.join(' | ')}`;
            }
            
            endScreen.style.display = 'flex';
        }

        function resetGame() {
            endScreen.style.display = 'none';
            initGame();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault(); 
                handleSpaceAction();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                triggerPenaltyStop(); 
            }
        });

        window.onload = initGame;
    </script>
</body>
</html>
